<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ledger of Visions | Realm Pictures</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
</head>
<body class="vault-body">
    <div class="candle-container left">
        <div class="flame"></div>
        <div class="candle"></div>
    </div>
    <div class="candle-container right">
        <div class="flame"></div>
        <div class="candle"></div>
    </div>

    <main class="scene">
        <p class="branding">SOLOMON KIN RECORDS, LLC MEDIA GROUP PRESENTS</p>
        
        <div class="book-wrap" onclick="handleBookOpen()">
            <div class="book" id="mainBook">
                <div class="cover">
                    <div class="cover-content">
                        <h1 class="main-title">THE LEDGER OF VISIONS</h1>
                        <hr>
                        <p class="sub-title">REALM PICTURES:<br>MOVIE TREATMENTS ARCHIVE [VOL 1]</p>
                        <div class="seal">EST. 2026</div>
                    </div>
                </div>
                <div class="page">
                    <div class="page-content">
                        <h2>OPENING...</h2>
                        <p class="page-text">"The truth is a mirror..."</p>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 NEHEMIAH MMM BROWN INC. | PHILADELPHIA MEDIA GROUP</p>
        </footer>
    </main>

    <script>
        function handleBookOpen() {
            const book = document.getElementById('mainBook');
            book.classList.add('open');
            
            // Redirects to the treatment after the animation finishes
            setTimeout(() => {
                window.location.href = "treatment-01.html";
            }, 1800);
        }
    </script>
</body>
</html>
